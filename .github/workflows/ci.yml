name: Xcode - Build and Analyze

on:
  push:
    branches: [ "main" ]
  # 不允许 PR 触发
  # pull_request:
  #   branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and analyse
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Daemon
        run: |
          chmod +x scripts/build-daemon.sh
          ./scripts/build-daemon.sh

      - name: Build
        run: |
          xcodebuild -project RoutePilot.xcodeproj \
            -scheme RoutePilot \
            -configuration Release \
            -derivedDataPath build \
            clean build