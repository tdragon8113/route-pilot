name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "Waiting for CI on commit: $COMMIT_SHA"

          # 等待 CI 完成（最多 10 分钟）
          MAX_WAIT=600
          WAITED=0

          while [ $WAITED -lt $MAX_WAIT ]; do
            STATUS=$(gh run list --commit "$COMMIT_SHA" --workflow ci.yml --json status,conclusion --jq '.[0]' || echo "")

            if [ -z "$STATUS" ]; then
              echo "No CI run found yet. Waiting..."
              sleep 30
              WAITED=$((WAITED + 30))
              continue
            fi

            RUN_STATUS=$(echo "$STATUS" | jq -r '.status')
            RUN_CONCLUSION=$(echo "$STATUS" | jq -r '.conclusion')

            echo "CI status: $RUN_STATUS, conclusion: $RUN_CONCLUSION"

            if [ "$RUN_STATUS" = "completed" ]; then
              if [ "$RUN_CONCLUSION" = "success" ]; then
                echo "CI passed. Proceeding with release."
                exit 0
              else
                echo "CI failed or cancelled ($RUN_CONCLUSION). Cannot release."
                exit 1
              fi
            fi

            sleep 30
            WAITED=$((WAITED + 30))
          done

          echo "Timeout waiting for CI."
          exit 1

      - name: Build
        run: |
          xcodebuild -project RoutePilot.xcodeproj \
            -scheme RoutePilot \
            -configuration Release \
            -derivedDataPath build \
            clean build

      - name: Package .app
        run: |
          mkdir -p release
          cp -r build/Build/Products/Release/RoutePilot.app release/

      - name: Create DMG
        run: |
          hdiutil create -volname "RoutePilot" \
            -srcfolder release/RoutePilot.app \
            -ov -format UDZO \
            release/RoutePilot.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RoutePilot
          path: release/RoutePilot.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: RoutePilot

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: RoutePilot.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}