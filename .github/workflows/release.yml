name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        id: build
        run: |
          # 调用本地构建脚本（构建逻辑在本地，无法被远程修改）
          ~/actions-runner/build-scripts/route-pilot.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RoutePilot
          path: release/RoutePilot.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          # 获取版本号（如 v1.1.0）
          VERSION=${GITHUB_REF#refs/tags/}
          echo "Extracting changelog for $VERSION"

          # 提取该版本的变更日志（从版本标题到下一个版本标题之间的内容）
          # 使用 awk 来提取特定版本的段落
          CHANGELOG=$(awk -v ver="$VERSION" '
            /^## \[/{ found=0 }
            /^## \['"$VERSION"'\]/ { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md | sed '/^$/d')

          # 如果找不到该版本的 changelog，使用自动生成
          if [ -z "$CHANGELOG" ]; then
            echo "No changelog entry found for $VERSION, will use auto-generated notes"
            echo "use_auto=true" >> $GITHUB_OUTPUT
          else
            echo "Found changelog for $VERSION"
            echo "use_auto=false" >> $GITHUB_OUTPUT
            # 多行内容需要特殊处理
            {
              echo 'body<<EOF'
              echo "$CHANGELOG"
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          fi

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: RoutePilot
          path: dist

      - name: List files
        run: ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/RoutePilot.dmg
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: ${{ steps.changelog.outputs.use_auto == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download v${{ steps.version.outputs.version }} --pattern "RoutePilot.dmg"

      - name: Calculate SHA256
        id: sha
        run: |
          SHA=$(sha256sum RoutePilot.dmg | cut -d' ' -f1)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Update Homebrew Tap
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA=${{ steps.sha.outputs.sha }}

          git clone https://x-access-token:${{ secrets.TAP_TOKEN }}@github.com/tdragon8113/homebrew-tap.git
          cd homebrew-tap

          sed -i "s/version \".*\"/version \"$VERSION\"/" Casks/route-pilot.rb
          sed -i "s/sha256 \".*\"/sha256 \"$SHA\"/" Casks/route-pilot.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update to v$VERSION"
          git push