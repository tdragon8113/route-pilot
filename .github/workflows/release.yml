name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check CI Status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 获取当前 commit SHA
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "Checking CI status for commit: $COMMIT_SHA"

          # 检查该 commit 的 CI 运行状态
          STATUS=$(gh run list --commit "$COMMIT_SHA" --workflow ci.yml --json status,conclusion --jq '.[0]')

          if [ -z "$STATUS" ]; then
            echo "No CI run found for this commit. Waiting..."
            sleep 30
            STATUS=$(gh run list --commit "$COMMIT_SHA" --workflow ci.yml --json status,conclusion --jq '.[0]')
          fi

          RUN_STATUS=$(echo "$STATUS" | jq -r '.status')
          RUN_CONCLUSION=$(echo "$STATUS" | jq -r '.conclusion')

          echo "CI run status: $RUN_STATUS, conclusion: $RUN_CONCLUSION"

          if [ "$RUN_STATUS" != "completed" ]; then
            echo "CI is still running. Please wait for CI to complete before releasing."
            exit 1
          fi

          if [ "$RUN_CONCLUSION" != "success" ]; then
            echo "CI failed or was cancelled. Cannot release."
            exit 1
          fi

          echo "CI passed. Proceeding with release."

      - name: Build
        run: |
          xcodebuild -project RoutePilot.xcodeproj \
            -scheme RoutePilot \
            -configuration Release \
            -derivedDataPath build \
            clean build

      - name: Package .app
        run: |
          mkdir -p release
          cp -r build/Build/Products/Release/RoutePilot.app release/

      - name: Create DMG
        run: |
          hdiutil create -volname "RoutePilot" \
            -srcfolder release/RoutePilot.app \
            -ov -format UDZO \
            release/RoutePilot.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RoutePilot
          path: release/RoutePilot.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: RoutePilot

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: RoutePilot.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}