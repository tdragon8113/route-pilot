name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # 从 tag 提取版本号 (v1.7.12 -> 1.7.12)
          VERSION=${GITHUB_REF#refs/tags/v}
          BUILD_NUMBER=$(echo $VERSION | awk -F. '{print $3}')

          echo "Version: $VERSION"
          echo "Build Number: $BUILD_NUMBER"

          # 更新 Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" RoutePilot/Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" RoutePilot/Resources/Info.plist

          # 验证更新
          echo "Updated Info.plist:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" RoutePilot/Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" RoutePilot/Resources/Info.plist

      - name: Build Daemon
        run: |
          chmod +x scripts/build-daemon.sh
          ./scripts/build-daemon.sh

      - name: Build
        run: |
          xcodebuild -project RoutePilot.xcodeproj \
            -scheme RoutePilot \
            -configuration Release \
            -derivedDataPath build \
            clean build

      - name: Sign app (ad-hoc)
        run: |
          codesign --force --deep --sign - build/Build/Products/Release/RoutePilot.app

      - name: Create DMG
        run: |
          mkdir -p release
          cp -r build/Build/Products/Release/RoutePilot.app release/
          hdiutil create -volname "RoutePilot" \
            -srcfolder release/RoutePilot.app \
            -ov -format UDZO \
            release/RoutePilot.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RoutePilot
          path: release/RoutePilot.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "Extracting changelog for $VERSION"
          CHANGELOG=$(awk -v ver="$VERSION" '
            /^## \[/{ found=0 }
            /^## \['"$VERSION"'\]/ { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md | sed '/^$/d')

          if [ -z "$CHANGELOG" ]; then
            echo "use_auto=true" >> $GITHUB_OUTPUT
          else
            echo "use_auto=false" >> $GITHUB_OUTPUT
            {
              echo 'body<<EOF'
              echo "$CHANGELOG"
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          fi

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: RoutePilot
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/RoutePilot.dmg
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: ${{ steps.changelog.outputs.use_auto == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download v${{ steps.version.outputs.version }} --pattern "RoutePilot.dmg"

      - name: Calculate SHA256
        id: sha
        run: |
          SHA=$(sha256sum RoutePilot.dmg | cut -d' ' -f1)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Update Homebrew Tap
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA=${{ steps.sha.outputs.sha }}

          git clone https://x-access-token:${{ secrets.TAP_TOKEN }}@github.com/tdragon8113/homebrew-tap.git
          cd homebrew-tap

          sed -i "s/version \".*\"/version \"$VERSION\"/" Casks/route-pilot.rb
          sed -i "s/sha256 \".*\"/sha256 \"$SHA\"/" Casks/route-pilot.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update to v$VERSION"
          git push