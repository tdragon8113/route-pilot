name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "Waiting for CI on commit: $COMMIT_SHA"

          # 等待 CI 完成（最多 10 分钟）
          MAX_WAIT=600
          WAITED=0

          while [ $WAITED -lt $MAX_WAIT ]; do
            STATUS=$(gh run list --commit "$COMMIT_SHA" --workflow ci.yml --json status,conclusion --jq '.[0]' || echo "")

            if [ -z "$STATUS" ]; then
              echo "No CI run found yet. Waiting..."
              sleep 30
              WAITED=$((WAITED + 30))
              continue
            fi

            RUN_STATUS=$(echo "$STATUS" | jq -r '.status')
            RUN_CONCLUSION=$(echo "$STATUS" | jq -r '.conclusion')

            echo "CI status: $RUN_STATUS, conclusion: $RUN_CONCLUSION"

            if [ "$RUN_STATUS" = "completed" ]; then
              if [ "$RUN_CONCLUSION" = "success" ]; then
                echo "CI passed. Proceeding with release."
                exit 0
              else
                echo "CI failed or cancelled ($RUN_CONCLUSION). Cannot release."
                exit 1
              fi
            fi

            sleep 30
            WAITED=$((WAITED + 30))
          done

          echo "Timeout waiting for CI."
          exit 1

      - name: Build
        run: |
          xcodebuild -project RoutePilot.xcodeproj \
            -scheme RoutePilot \
            -configuration Release \
            -derivedDataPath build \
            clean build

      - name: Package .app
        run: |
          mkdir -p release
          cp -r build/Build/Products/Release/RoutePilot.app release/

      - name: Create DMG
        run: |
          hdiutil create -volname "RoutePilot" \
            -srcfolder release/RoutePilot.app \
            -ov -format UDZO \
            release/RoutePilot.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RoutePilot
          path: release/RoutePilot.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          # 获取版本号（如 v1.1.0）
          VERSION=${GITHUB_REF#refs/tags/}
          echo "Extracting changelog for $VERSION"

          # 提取该版本的变更日志（从版本标题到下一个版本标题之间的内容）
          # 使用 awk 来提取特定版本的段落
          CHANGELOG=$(awk -v ver="$VERSION" '
            /^## \[/{ found=0 }
            /^## \['"$VERSION"'\]/ { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md | sed '/^$/d')

          # 如果找不到该版本的 changelog，使用自动生成
          if [ -z "$CHANGELOG" ]; then
            echo "No changelog entry found for $VERSION, will use auto-generated notes"
            echo "use_auto=true" >> $GITHUB_OUTPUT
          else
            echo "Found changelog for $VERSION"
            echo "use_auto=false" >> $GITHUB_OUTPUT
            # 多行内容需要特殊处理
            {
              echo 'body<<EOF'
              echo "$CHANGELOG"
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          fi

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: RoutePilot

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: RoutePilot.dmg
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: ${{ steps.changelog.outputs.use_auto == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}